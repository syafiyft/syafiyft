<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #bird {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #FFD700;
            border-radius: 50%;
            left: 50px;
            top: 250px;
            box-shadow: -2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        .pipe {
            position: absolute;
            background: #2ecc71;
            width: 60px;
            border: 2px solid #27ae60;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            z-index: 10;
        }

        #gameOver {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .gameOverText {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .finalScore {
            color: #FFD700;
            font-size: 32px;
            margin-bottom: 40px;
        }

        .restartBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .restartBtn:hover {
            background: #764ba2;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 14px;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <div id="bird"></div>
        <div id="gameOver">
            <div class="gameOverText">GAME OVER!</div>
            <div class="finalScore">Score: <span id="finalScore">0</span></div>
            <button class="restartBtn" onclick="location.reload()">Play Again</button>
        </div>
        <div class="instructions">Press SPACE or Click to Jump</div>
    </div>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const bird = document.getElementById('bird');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        let birdY = 250;
        let birdVelocity = 0;
        let score = 0;
        let isGameRunning = true;
        const gravity = 0.6;
        const jumpPower = -12;
        const pipeWidth = 60;
        const pipeGap = 120;
        const pipeSpeed = 5;

        let pipes = [];
        let pipeCounter = 0;

        // Handle jump
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        gameContainer.addEventListener('click', jump);

        function jump() {
            if (isGameRunning) {
                birdVelocity = jumpPower;
            }
        }

        function createPipe() {
            const topPipeHeight = Math.random() * (300 - 50) + 50;
            const bottomPipeY = topPipeHeight + pipeGap;

            pipes.push({
                x: gameContainer.offsetWidth,
                topHeight: topPipeHeight,
                bottomY: bottomPipeY,
                scored: false
            });
        }

        function update() {
            if (!isGameRunning) return;

            // Update bird
            birdVelocity += gravity;
            birdY += birdVelocity;
            bird.style.top = birdY + 'px';

            // Check collisions with walls
            if (birdY <= 0 || birdY + 40 >= gameContainer.offsetHeight) {
                endGame();
                return;
            }

            // Generate pipes
            pipeCounter++;
            if (pipeCounter > 90) {
                createPipe();
                pipeCounter = 0;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;

                // Remove pipes that are off screen
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }

                // Scoring
                if (pipe.x + pipeWidth === 50 && !pipe.scored) {
                    pipe.scored = true;
                    score++;
                    scoreDisplay.textContent = 'Score: ' + score;
                }

                // Check collision
                const birdLeft = 50;
                const birdRight = birdLeft + 40;
                const birdTop = birdY;
                const birdBottom = birdY + 40;

                if (birdRight > pipe.x && birdLeft < pipe.x + pipeWidth) {
                    if (birdTop < pipe.topHeight || birdBottom > pipe.bottomY) {
                        endGame();
                        return;
                    }
                }
            });

            requestAnimationFrame(update);
        }

        function endGame() {
            isGameRunning = false;
            gameOverScreen.style.display = 'flex';
            finalScoreDisplay.textContent = score;
        }

        // Start game
        update();
    </script>
</body>
</html>
